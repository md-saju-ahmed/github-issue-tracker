<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
    <!-- Tailwind & Custom CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white flex justify-between items-center flex-wrap sm:flex-nowrap gap-4 border-b border-[#e9e9e9] py-4 px-4 md:px-10 lg:px-20">
        <div class="flex-1">
            <a href="/">
                <div class="flex items-center gap-1">
                    <img src="./assets/img/github-logo.svg" alt="GitHub" width="36" height="36">
                    <h1 class="text-lg sm:text-xl md:text-2xl font-semibold leading-7">GitHub Issues Tracker</h1>
                </div>
            </a>
        </div>
        <div class="flex flex-wrap gap-4">
            <div class="relative w-full sm:w-auto">
                <img class="mr-1 absolute top-3.5 left-4 z-10" src="./assets/img/search.svg" alt="Search" width="16" height="16">
                <input type="search" placeholder="Search issues..." id="input-search" class="border border-[#e4e4e7] px-4 pl-9 w-full sm:w-48 md:w-auto h-11 rounded-sm" required>
            </div>
            <button class="bg-[#4A00FF] hover:bg-[#3C00D6] text-white font-semibold leading-[19px] capitalize flex items-center gap-1 cursor-pointer rounded-sm py-3 px-4 h-11">
                <img src="./assets/img/plus.svg" alt="Plus" class="mr-1" width="16" height="16"> New Issue
            </button>
        </div>
    </header>

    <!-- Scripts -->
    <script src="./assets/js/app.js"></script>
</body>
</html>
