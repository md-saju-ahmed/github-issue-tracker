<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
    <!-- Tailwind & Custom CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white flex justify-between items-center flex-wrap sm:flex-nowrap gap-4 border-b border-[#e9e9e9] py-4 px-4 md:px-10 lg:px-20">
        <div class="flex-1">
            <a href="/">
                <div class="flex items-center gap-1">
                    <img src="./assets/img/github-logo.svg" alt="GitHub" width="36" height="36">
                    <h1 class="text-lg sm:text-xl md:text-2xl font-semibold leading-7">GitHub Issues Tracker</h1>
                </div>
            </a>
        </div>
        <div class="flex flex-wrap gap-4">
            <div class="relative w-full sm:w-auto">
                <img class="mr-1 absolute top-3.5 left-4 z-10" src="./assets/img/search.svg" alt="Search" width="16" height="16">
                <input type="search" placeholder="Search issues..." id="input-search" class="border border-[#e4e4e7] px-4 pl-9 w-full sm:w-48 md:w-auto h-11 rounded-sm" required>
            </div>
            <button class="bg-[#4A00FF] hover:bg-[#3C00D6] text-white font-semibold leading-[19px] capitalize flex items-center gap-1 cursor-pointer rounded-sm py-3 px-4 h-11">
                <img src="./assets/img/plus.svg" alt="Plus" class="mr-1" width="16" height="16"> New Issue
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-6xl w-full mx-auto my-15 px-4 space-y-4">

        <!-- Filter Buttons -->
        <section id="filter-btns" class="bg-white p-6 rounded-lg shadow-[0px_1px_6px_0px_#00000014]">
            <div class="flex items-center flex-wrap gap-2">
                <button id="all-filter-btn" onclick="toggleFilter('all-filter-btn')" class="bg-[#4A00FF] hover:bg-[#3C00D6] text-white px-3 py-2 rounded-sm border border-[#e4e4e7] w-30 h-10 cursor-pointer">All</button>
                <button id="open-filter-btn" onclick="toggleFilter('open-filter-btn')" class="text-[#64748b] px-3 py-2 rounded-sm border border-[#e4e4e7] w-30 h-10 cursor-pointer">Open</button>
                <button id="closed-filter-btn" onclick="toggleFilter('closed-filter-btn')" class="text-[#64748b] px-3 py-2 rounded-sm border border-[#e4e4e7] w-30 h-10 cursor-pointer">Closed</button>
            </div>
        </section>

        <!-- Issues -->
        <section id="issue-container" class="rounded-lg overflow-hidden shadow-[0px_5px_10px_0px_#00000014]">
            <!-- Title -->
            <div class="bg-white flex justify-between items-center flex-wrap gap-2 p-6 border-b border-[#e4e4e7]">
                <div class="flex items-center gap-2">
                    <div class="bg-[#ECE4FF] w-12.5 h-12.5 flex justify-center items-center rounded-full">
                        <img src="./assets/img/aperture.svg" alt="Aperture" width="32" height="32">
                    </div>
                    <div class="space-y-1">
                        <h2 class="text-[20px] font-semibold leading-6"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-[#64748b] leading-[19px]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <p class="flex items-center gap-2 font-medium leading-[19px]">
                        <span class="block w-3 h-3 bg-[#00a96e] rounded-full"></span> Open
                    </p>
                    <p class="flex items-center gap-2 font-medium leading-[19px]">
                        <span class="block w-3 h-3 bg-[#a855f7] rounded-full"></span> Closed
                    </p>
                </div>
            </div>

            <!-- All Issues -->
            <div id="all-issues" class="bg-[#fbfbfb] p-6">
                <!-- Spinner -->
                <div id="spinner" class="flex justify-center items-center py-10 hidden">
                    <svg class="size-8 animate-spin text-[#4A00FF]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                    </svg>
                </div>

                <!-- All Issue Container -->
                <div id="all-issues-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="./assets/js/app.js"></script>
</body>
</html>
